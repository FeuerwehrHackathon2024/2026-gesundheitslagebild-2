<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MANV-Dispatch — Leitstelle{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-danger-subtle border-bottom border-danger shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-danger-emphasis" href="/">
        <i class="bi bi-hospital-fill me-1"></i>
        MANV-Dispatch <span class="fw-normal text-body-secondary">— Leitstelle</span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <a href="/simulator" class="btn btn-sm btn-outline-danger">
          <i class="bi bi-sliders2"></i> Simulator
        </a>
        <span class="badge bg-danger text-light d-flex align-items-center gap-1">
          <i class="bi bi-geo-alt-fill"></i> Hub Süd · Ulm
        </span>
        <span class="text-body-secondary small d-none d-md-inline">
          <i class="bi bi-clock"></i> 72 h Vorlauf · ~250 Verletzte/Tag
        </span>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- Bootstrap Bundle (inkl. Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
